name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-go:
    name: Build Go Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: cd src/gateway && go build -v ./...

  build-rust:
    name: Build Rust Enclave
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cd src/enclave && cargo build --verbose

  lint-python:
    name: Lint Python Telemetry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with ruff
        run: ruff check src/telemetry

  test-robot:
    name: Robot Framework Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Robot Framework
        run: pip install robotframework
      - name: Run Tests
        run: |
          mkdir -p test-results
          # Placeholder for now until test cases are written
          echo "No tests to run yet"
